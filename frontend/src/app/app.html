<div class="container mt-5">
  <div class="card shadow-sm">
    <div class="card-header bg-primary text-white">
      <h3 class="mb-0">Test de Connexion</h3>
    </div>
    <div class="card-body">

      <div *ngIf="errorMessage()" class="alert alert-danger" role="alert">
        {{ errorMessage() }}
      </div>

      <h4 class="mb-3 text-secondary">Liste des Véhicules  :</h4>

      <div *ngIf="vehicules().length === 0 && !errorMessage()" class="text-center py-3">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Chargement...</span>
        </div>
      </div>

      <table *ngIf="vehicules().length > 0" class="table table-striped table-hover align-middle">
        <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Marque</th>
          <th>Modèle</th>
          <th>Matricule</th>
          <th>Prix / Jour (DH)</th>
          <th>Statut</th>
        </tr>
        </thead>
        <tbody>
        <tr *ngFor="let v of vehicules()">
          <td>{{ v.id }}</td>
          <td><strong>{{ v.marque }}</strong></td>
          <td>{{ v.modele }}</td>
          <td><span class="badge bg-secondary">{{ v.matricule }}</span></td>
          <td>{{ v.prixParJour }} DH</td>
          <td>
              <span class="badge" [ngClass]="v.statut === 'DISPONIBLE' ? 'bg-success' : 'bg-warning'">
                {{ v.statut }}
              </span>
          </td>
        </tr>
        </tbody>
      </table>

    </div>
  </div>
</div>
